<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下午茶抽選機</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff8f2;
      --bg2: #ffe5cc;
      --card: #ffffff;
      --accent: #f4a261;
      --accent2: #e76f51;
      --chip-on: #1c1c1c;
      --text: #1c1c1c;
      --muted: #888;
      --border: #e8e8e8;
      --item-bg: #fef6ee;
      --shadow: 0 4px 24px rgba(0,0,0,.09);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 14px 60px;
      color: var(--text);
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -.5px; }
    .header p  { font-size: .85rem; color: var(--muted); margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
      width: 100%;
      max-width: 440px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: .88rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 14px;
    }

    /* ── Filter chips ── */
    .chips-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border: 2px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      background: #fff;
      font-size: .78rem;
      font-weight: 600;
      transition: all .15s;
      user-select: none;
    }
    .chip:hover { border-color: #bbb; }
    .chip.on {
      background: var(--chip-on);
      border-color: var(--chip-on);
      color: #fff;
    }
    .chip-icon { font-size: 1rem; }

    .btn-pick {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(231,111,81,.35);
      transition: transform .1s, opacity .15s;
      letter-spacing: .5px;
    }
    .btn-pick:active  { transform: scale(.97); }
    .btn-pick:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    /* ── Slot machine ── */
    .slot-wrap {
      width: 100%;
      height: 82px;
      background: var(--item-bg);
      border: 3px solid var(--accent);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    .slot-wrap::before, .slot-wrap::after {
      content: '';
      position: absolute; left: 0; right: 0;
      height: 24px; z-index: 2; pointer-events: none;
    }
    .slot-wrap::before { top: 0;    background: linear-gradient(to bottom, var(--item-bg), transparent); }
    .slot-wrap::after  { bottom: 0; background: linear-gradient(to top,   var(--item-bg), transparent); }

    .slot-reel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .slot-item {
      height: 82px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 0 14px;
      text-align: center;
      flex-shrink: 0;
      color: #555;
    }
    .slot-item.win { color: var(--accent2); font-size: 1.2rem; }

    .result-line {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent2);
      min-height: 32px;
      text-align: center;
      letter-spacing: .5px;
    }

    /* ── Store list ── */
    .panel-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .panel-head span:first-child { font-weight: 700; font-size: .95rem; }
    .count-dot {
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 1px 10px;
      font-size: .78rem;
      font-weight: 700;
    }

    #store-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 380px;
      overflow-y: auto;
    }
    #store-list::-webkit-scrollbar { width: 5px; }
    #store-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    .sitem {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--item-bg);
      border-radius: 10px;
      transition: opacity .2s;
    }
    .sitem.ex { opacity: .32; text-decoration: line-through; }
    .sinfo { flex: 1; min-width: 0; }
    .sname {
      font-size: .9rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .smeta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .btn-ex {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 3px 10px;
      font-size: .72rem;
      font-family: inherit;
      cursor: pointer;
      color: #888;
      transition: all .15s;
      white-space: nowrap;
    }
    .sitem.ex .btn-ex { border-color: var(--accent); color: var(--accent); }

    /* ── Reset link ── */
    .reset-link {
      font-size: .78rem;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-link:hover { color: var(--accent2); }
  </style>
</head>
<body>

<div class="header">
  <h1>🧋 下午茶抽選機</h1>
  <p>選好類型，讓老天幫你決定今天喝什麼</p>
</div>

<!-- ① Filter -->
<div class="card">
  <div class="card-title">選擇類型（可複選）</div>
  <div class="chips-row" id="chips"></div>
  <button class="btn-pick" id="btn-spin">🎰 幫我決定！</button>
</div>

<!-- ② Slot result -->
<div class="card" style="display:flex;flex-direction:column;gap:14px;align-items:center;">
  <div class="slot-wrap" style="width:100%">
    <div class="slot-reel" id="slot-reel">
      <div class="slot-item">請先選類型，再按「幫我決定」</div>
    </div>
  </div>
  <div class="result-line" id="result-line"></div>
</div>

<!-- ③ Store list -->
<div class="card">
  <div class="panel-head">
    <span>店家清單</span>
    <span class="count-dot" id="cnt">0</span>
  </div>
  <ul id="store-list"></ul>
  <div class="reset-link" id="btn-reset">↺ 取消所有排除</div>
</div>

<script>
// ─── Store data ────────────────────────────────────────────────────────────
// tag: 0=全部, 1=連鎖品牌, 2=台式紅茶, 3=特色/精品
const STORES = [
  { name:'50嵐',              tag:1 },
  { name:'清心福全',          tag:1 },
  { name:'迷客夏 Milksha',    tag:1 },
  { name:'可不可熟成紅茶',    tag:1 },
  { name:'麻古茶坊',          tag:1 },
  { name:'萬波島嶼紅茶',      tag:1 },
  { name:'龜記茗品',          tag:1 },
  { name:'五桐號',            tag:1 },
  { name:'得正',              tag:1 },
  { name:'Oolong Tea Project', tag:3 },
  { name:'珍煮丹',            tag:1 },
  { name:'一芳水果茶',        tag:1 },
  { name:'康青龍',            tag:1 },
  { name:'大苑子',            tag:1 },
  { name:'老賴茶棧',          tag:2 },
  { name:'抿茶 min cha',      tag:3 },
  { name:'嵐天 skyline',      tag:3 },
  { name:'再睡5分鐘',         tag:3 },
  { name:'春陽茶事',          tag:1 },
  { name:'茶湯會',            tag:1 },
  { name:'鮮茶道',            tag:1 },
  { name:'功夫茶 KUNGFUTEA',  tag:1 },
  { name:'七盞茶',            tag:3 },
  { name:'有飲 Youin',        tag:3 },
  { name:'高記茶莊',          tag:2 },
  { name:'明泉紅茶',          tag:2 },
  { name:'蔡元益紅茶',        tag:2 },
  { name:'四葉手作茶',        tag:3 },
  { name:'森本木茶飲',        tag:3 },
  { name:'紅茶媽媽',          tag:2 },
  { name:'渡口茶飲',          tag:3 },
  { name:'十盛',              tag:3 },
  { name:'進發家',            tag:2 },
  { name:'約翰紅茶公司',      tag:2 },
  { name:'烏弄 UNOCHA',       tag:3 },
  { name:'自在軒',            tag:3 },
  { name:'布萊恩紅茶',        tag:2 },
  { name:'鶴茶樓',            tag:3 },
  { name:'叮哥茶飲',          tag:1 },
  { name:'不要對我尖叫',      tag:3 },
];

const CATS = [
  { id: 0, icon: '🍵', label: '全部' },
  { id: 1, icon: '🏪', label: '連鎖品牌' },
  { id: 2, icon: '🍵', label: '台式紅茶' },
  { id: 3, icon: '✨', label: '特色精品' },
];

// ─── State ─────────────────────────────────────────────────────────────────
let selectedTags = new Set([0]);
let excluded     = new Set();
let spinning     = false;

// ─── Chip render ───────────────────────────────────────────────────────────
const chipsEl = document.getElementById('chips');
CATS.forEach(c => {
  const el = document.createElement('div');
  el.className = 'chip' + (selectedTags.has(c.id) ? ' on' : '');
  el.innerHTML = `<span class="chip-icon">${c.icon}</span>${c.label}`;
  el.addEventListener('click', () => {
    if (c.id === 0) {
      selectedTags.clear();
      selectedTags.add(0);
    } else {
      selectedTags.delete(0);
      selectedTags.has(c.id) ? selectedTags.delete(c.id) : selectedTags.add(c.id);
      if (!selectedTags.size) selectedTags.add(0);
    }
    document.querySelectorAll('.chip').forEach((el, i) => {
      el.classList.toggle('on', selectedTags.has(CATS[i].id));
    });
    renderList();
  });
  chipsEl.appendChild(el);
});

// ─── Helpers ───────────────────────────────────────────────────────────────
function activePool() {
  const tagged = selectedTags.has(0)
    ? STORES
    : STORES.filter(s => selectedTags.has(s.tag));
  return tagged.filter(s => !excluded.has(s.name));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Store list ────────────────────────────────────────────────────────────
function renderList() {
  const listEl = document.getElementById('store-list');
  const tagged = selectedTags.has(0)
    ? STORES
    : STORES.filter(s => selectedTags.has(s.tag));

  document.getElementById('cnt').textContent = tagged.filter(s => !excluded.has(s.name)).length;
  listEl.innerHTML = '';

  tagged.forEach(s => {
    const isEx = excluded.has(s.name);
    const li = document.createElement('li');
    li.className = 'sitem' + (isEx ? ' ex' : '');
    const tagName = CATS.find(c => c.id === s.tag)?.label ?? '';
    li.innerHTML = `
      <div class="sinfo">
        <div class="sname">${esc(s.name)}</div>
        <div class="smeta">${esc(tagName)}</div>
      </div>
      <button class="btn-ex" data-name="${esc(s.name)}">${isEx ? '取消排除' : '排除'}</button>`;
    listEl.appendChild(li);
  });

  listEl.querySelectorAll('.btn-ex').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      excluded.has(name) ? excluded.delete(name) : excluded.add(name);
      renderList();
    });
  });
}

document.getElementById('btn-reset').addEventListener('click', () => {
  excluded.clear();
  renderList();
});

// ─── Slot machine ──────────────────────────────────────────────────────────
const slotReel   = document.getElementById('slot-reel');
const resultLine = document.getElementById('result-line');

document.getElementById('btn-spin').addEventListener('click', () => {
  if (spinning) return;
  const pool = activePool();
  if (!pool.length) {
    resultLine.textContent = '⚠️ 沒有可用店家，請調整篩選';
    return;
  }

  spinning = true;
  resultLine.textContent = '';

  const winner = pool[Math.floor(Math.random() * pool.length)];
  const N = 28;
  const items = Array.from({ length: N - 1 }, () =>
    pool[Math.floor(Math.random() * pool.length)].name
  );
  items.push(winner.name);

  slotReel.style.transition = 'none';
  slotReel.style.transform  = 'translateY(0)';
  slotReel.innerHTML = items.map((n, i) =>
    `<div class="slot-item${i === N-1 ? ' win' : ''}">${esc(n)}</div>`
  ).join('');

  const H = 82;
  slotReel.getBoundingClientRect();
  slotReel.style.transition = `transform ${(N * 0.09).toFixed(1)}s cubic-bezier(0.12,0.88,0.3,1)`;
  slotReel.style.transform  = `translateY(${-(N - 1) * H}px)`;

  setTimeout(() => {
    resultLine.textContent = '🎉 ' + winner.name + ' 🎉';
    spinning = false;
  }, N * 90 + 400);
});

// ─── Init ──────────────────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>
